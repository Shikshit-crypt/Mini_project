<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container mt-5 col-md-4">
  <div class="card p-4 shadow">
    <h3 class="text-center">Register</h3>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">

    <select id="role" class="form-control mb-3">
      <option value="donor">Donor</option>
      <option value="ngo">NGO</option>
    </select>

    <button class="btn btn-success w-100" onclick="register()">Register</button>

    <p class="mt-3 text-center">
      Already have an account? <a href="login.html">Login</a>
    </p>
  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>

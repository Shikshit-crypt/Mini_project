<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(90deg, blue, blue);">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold"><i class="fa-solid fa-hand-holding-heart"></i> SevaSetu</a>

    <div>
      <button class="btn btn-light btn-sm me-2" onclick="showDashboard()">
        <i class="fa fa-home"></i>
      </button>
      <button class="btn btn-light btn-sm me-2" onclick="showDonations()">
        <i class="fa fa-box"></i>
      </button>
      <button class="btn btn-dark btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <h4 id="welcome" class="fw-bold"></h4>
<p class="text-muted">Helping people connect through donations ❤️</p>

  <!-- Stats -->
  <div class="row mb-4 text-center">
    <div class="col-4">
      <div class="card stats-card p-3">
        <i class="fa fa-list fa-lg"></i>
        <h6>Total</h6>
        <h4 id="totalNeeds">0</h4>
      </div>
    </div>

    <div class="col-4">
      <div class="card stats-card p-3">
        <i class="fa fa-clock fa-lg"></i>
        <h6>Pending</h6>
        <h4 id="pendingNeeds">0</h4>
      </div>
    </div>

    <div class="col-4">
      <div class="card stats-card p-3">
        <i class="fa fa-check fa-lg"></i>
        <h6>Done</h6>
        <h4 id="fulfilledNeeds">0</h4>
      </div>
    </div>
  </div>

  <!-- NGO -->
  <div id="ngoSection" class="card p-3 mb-4 shadow">
    <h5><i class="fa fa-plus-circle"></i> Add Requirement</h5>
    <input id="item" class="form-control mb-2" placeholder="Enter item">
    <button class="btn btn-danger" onclick="addNeed()">Add</button>
  </div>

  <!-- Needs -->
  <div class="row" id="needsList"></div>

</div>

<footer class="text-center mt-4 p-3 bg-light">
  <small>© SevaSetu | Built for Social Good</small>
</footer>

<script src="js/app.js"></script>
</body>
</html>
